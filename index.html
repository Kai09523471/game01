<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>とある館にて</title>
    <style>
        
        body {
            background-color: black;
            color: white;
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            text-align: center;
            margin-top: 15%;
        }

        
        .hidden {
            display: none;
        }

        
        .menu-item {
            font-size: 24px;
            margin: 15px;
        }
        .selected {
            color: yellow;
        }

        
        input[type="text"] {
            font-size: 20px;
            padding: 5px;
            text-align: center;
        }

        
        #dialogue-box {
            font-size: 22px;
            border: 1px solid white;
            padding: 20px;
            width: 60%;
            margin: 0 auto;
            text-align: left;
            min-height: 80px;
        }
    </style>
</head>
<body>

    <div id="title-scene">
        <h1 style="margin-bottom: 50px; letter-spacing: 5px;">UNTITLED GAME</h1>
        <div id="menu-newgame" class="menu-item selected">▶ ニューゲーム</div>
        <div id="menu-continue" class="menu-item">　 コンティニュー</div>
    </div>

    <div id="name-scene" class="hidden">
        <h2>あなたの名前を教えてください</h2>
        <input type="text" id="player-name" placeholder="なまえ" autocomplete="off">
        <p style="font-size: 14px; color: gray;">入力後、Enterキーを押してください</p>
    </div>

    <div id="dialogue-scene" class="hidden">
        <div id="dialogue-box"></div>
        <p style="font-size: 14px; color: gray;">▼ Enterキーで進む</p>
    </div>

    <script>
        let currentScene = 'title'; 
        let titleMenuIndex = 0;     
        let playerName = "";        

        const dialogues = [
            "「……目が覚めたか。」",
            "「ここはどこだか分かるか？ ……いや、無理もないか。」",
            "「お前の名前は……そう、『[NAME]』だったな。」",
            "「さあ、[NAME]。立ち上がるんだ。」",
            "「お前の物語が、今始まる――。」"
        ];
        let dialogueIndex = 0; 

        
        document.addEventListener('keydown', (e) => {
            
            
            if (e.isComposing || e.keyCode === 229) {
                return;
            }
            
            
            if (currentScene === 'title') {
                if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                    titleMenuIndex = (titleMenuIndex === 0) ? 1 : 0;
                    updateTitleMenu();
                } else if (e.key === 'Enter') {
                    if (titleMenuIndex === 0) {
                        changeScene('name'); 
                    } else {
                        alert('コンティニューデータがありません！');
                    }
                }
            } 
        
            else if (currentScene === 'name') {
                if (e.key === 'Enter') {
                    const input = document.getElementById('player-name').value;
                    if (input.trim() !== '') {
                        playerName = input; 
                        changeScene('dialogue'); 
                        showDialogue();
                    }
                }
            } 
            
            else if (currentScene === 'dialogue') {
                if (e.key === 'Enter') {
                    dialogueIndex++; 
                    showDialogue();
                }
            }
        });
