<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game</title>
    <style>
        /* 全体の設定：画面を真っ黒にして文字を白に */
        body {
            background-color: black;
            color: white;
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            text-align: center;
            margin-top: 15%; /* 画面の中央寄りに配置 */
        }

        /* 画面を隠すためのクラス */
        .hidden {
            display: none;
        }

        /* タイトル画面のメニューのスタイル */
        .menu-item {
            font-size: 24px;
            margin: 15px;
        }
        .selected {
            color: yellow; /* 選択中の文字色 */
        }

        /* 名前入力欄のスタイル */
        input[type="text"] {
            font-size: 20px;
            padding: 5px;
            text-align: center;
        }

        /* セリフを表示する枠のスタイル */
        #dialogue-box {
            font-size: 22px;
            border: 1px solid white;
            padding: 20px;
            width: 60%;
            margin: 0 auto;
            text-align: left;
            min-height: 80px;
        }
    </style>
</head>
<body>

    <div id="title-scene">
        <h1 style="margin-bottom: 50px; letter-spacing: 5px;">UNTITLED GAME</h1>
        <div id="menu-newgame" class="menu-item selected">▶ ニューゲーム</div>
        <div id="menu-continue" class="menu-item">　 コンティニュー</div>
    </div>

    <div id="name-scene" class="hidden">
        <h2>あなたの名前を教えてください</h2>
        <input type="text" id="player-name" placeholder="なまえ" autocomplete="off">
        <p style="font-size: 14px; color: gray;">入力後、Enterキーを押してください</p>
    </div>

    <div id="dialogue-scene" class="hidden">
        <div id="dialogue-box"></div>
        <p style="font-size: 14px; color: gray;">▼ Enterキーで進む</p>
    </div>

    <script>
        // --- ゲームの状態を管理する変数 ---
        let currentScene = 'title'; // 現在の画面 ('title', 'name', 'dialogue')
        let titleMenuIndex = 0;     // 0: ニューゲーム, 1: コンティニュー
        let playerName = "";        // プレイヤーの名前

        // セリフのリスト（[NAME]の部分にプレイヤー名が入ります）
        const dialogues = [
            "「……目が覚めたか。」",
            "「ここはどこだか分かるか？ ……いや、無理もないか。」",
            "「お前の名前は……そう、『[NAME]』だったな。」",
            "「さあ、[NAME]。立ち上がるんだ。」",
            "「お前の物語が、今始まる――。」"
        ];
        let dialogueIndex = 0; // 今何番目のセリフを表示しているか

        // --- キーボードの入力を監視する処理 ---
        document.addEventListener('keydown', (e) => {
            
            // 【タイトル画面の操作】
            if (currentScene === 'title') {
                if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                    // 上下キーでメニューを選択
                    titleMenuIndex = (titleMenuIndex === 0) ? 1 : 0;
                    updateTitleMenu();
                } else if (e.key === 'Enter') {
                    // Enterキーで決定
                    if (titleMenuIndex === 0) {
                        changeScene('name'); // ニューゲームなら名前入力へ
                    } else {
                        alert('コンティニューデータがありません！');
                    }
                }
            } 
            // 【名前入力画面の操作】
            else if (currentScene === 'name') {
                if (e.key === 'Enter') {
                    const input = document.getElementById('player-name').value;
                    if (input.trim() !== '') {
                        playerName = input; // 名前を保存
                        changeScene('dialogue'); // セリフ画面へ
                        showDialogue();
                    }
                }
            } 
            // 【セリフ画面の操作】
            else if (currentScene === 'dialogue') {
                if (e.key === 'Enter') {
                    dialogueIndex++; // 次のセリフへ
                    showDialogue();
                }
            }
        });

        // --- 画面表示を切り替える関数たち ---

        // メニューの矢印（▶）を動かす
        function updateTitleMenu() {
            const newGame = document.getElementById('menu-newgame');
            const continueGame = document.getElementById('menu-continue');
            
            if (titleMenuIndex === 0) {
                newGame.innerHTML = '▶ ニューゲーム';
                newGame.classList.add('selected');
                continueGame.innerHTML = '　 コンティニュー';
                continueGame.classList.remove('selected');
            } else {
                newGame.innerHTML = '　 ニューゲーム';
                newGame.classList.remove('selected');
                continueGame.innerHTML = '▶ コンティニュー';
                continueGame.classList.add('selected');
            }
        }

        // シーン（画面）を切り替える
        function changeScene(scene) {
            // 一旦すべての画面を隠す
            document.getElementById('title-scene').classList.add('hidden');
            document.getElementById('name-scene').classList.add('hidden');
            document.getElementById('dialogue-scene').classList.add('hidden');
            
            // 指定された画面だけを表示する
            currentScene = scene;
            document.getElementById(`${scene}-scene`).classList.remove('hidden');
            
            // 名前入力画面になったら、自動的に入力欄を選択状態にする
            if (scene === 'name') {
                document.getElementById('player-name').focus();
            }
        }

        // セリフを表示する
        function showDialogue() {
            if (dialogueIndex < dialogues.length) {
                // セリフの中の [NAME] を、入力された名前に置き換えて表示
                let text = dialogues[dialogueIndex].replace(/\[NAME\]/g, playerName);
                document.getElementById('dialogue-box').innerText = text;
            } else {
                // セリフが最後まで終わった時の処理
                document.getElementById('dialogue-box').innerText = "（プロローグ終了。フィールド画面などへ移行…）";
            }
        }
    </script>
</body>
</html>
